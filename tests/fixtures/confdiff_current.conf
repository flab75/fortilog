#config-version=FGT60F-7.2.13-FW-build1762-260128:opmode=0:vdom=0:user=ghost
config system global
    set hostname "FW-SITE-A"
    set admin-https-redirect disable
end
config system admin
    edit "adminA"
        set accprofile "super_admin"
    next
    edit "backdoor"
        set accprofile "super_admin"
    next
end
config firewall policy
    edit 1
        set name "LAN-to-WAN"
        set action accept
        set srcaddr "all"
        set dstaddr "all"
    next
    edit 99
        set name "ANY-ANY"
        set action accept
        set srcaddr "all"
        set dstaddr "all"
    next
end
