#config-version=FGT60F-7.2.13-FW-build1762-260128:opmode=0:vdom=0:user=adminA
config system global
    set hostname "FW-SAMPLE"
end
config system interface
    edit "wan1"
        set ip 51.91.100.10 255.255.255.0
        set allowaccess ping https
        set role wan
    next
    edit "internal"
        set ip 10.50.0.1 255.255.255.0
        set allowaccess ping https ssh
        set role lan
    next
    edit "dmz"
        set ip 172.16.5.1 255.255.255.0
        set role dmz
    next
end
config system admin
    edit "adminA"
        set accprofile "super_admin"
    next
    edit "adminB"
        set accprofile "super_admin"
    next
end
config system sso-admin
    edit "ssoadminX"
        set accprofile "super_admin"
    next
end
config system dns
    set primary 96.45.45.45
    set secondary 96.45.46.46
end
config user local
    edit "guest"
        set type password
    next
    edit "vpnuser1"
        set type password
    next
    edit "vpnuser2"
        set type password
    next
end
config user group
    edit "VPN Staff"
        set member "vpnuser1" "vpnuser2"
    next
end
config vpn ssl settings
    set port 10443
    config authentication-rule
        edit 1
            set groups "VPN Staff"
            set portal "full-access"
        next
    end
end
config vpn ipsec phase1-interface
    edit "to-site-b"
        set remote-gw 198.51.100.50
        set psksecret ENC xxxxxxxx
    next
end
