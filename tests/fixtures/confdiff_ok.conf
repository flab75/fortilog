#config-version=FGT60F-7.2.13-FW-build1762-260128:opmode=0:vdom=0:user=adminA
config system global
    set hostname "FW-SITE-A"
    set admin-https-redirect enable
end
config system admin
    edit "adminA"
        set accprofile "super_admin"
        set trusthost1 10.10.1.0 255.255.255.0
    next
    edit "adminB"
        set accprofile "super_admin"
        set trusthost1 10.10.1.0 255.255.255.0
    next
end
config firewall policy
    edit 1
        set name "LAN-to-WAN"
        set action accept
        set srcaddr "all"
        set dstaddr "all"
    next
end
