#config-version=FGT60F-7.2.13-FW-build1762-260128:opmode=0:vdom=0:user=ghost
#buildno=1762
config system global
    set admin-https-redirect disable
    set hostname "FW-SITE-A"
end
config system admin
    edit "adminA"
        set accprofile "super_admin"
        set vdom "root"
        set trusthost1 10.10.1.0 255.255.255.0
    next
    edit "backdoor"
        set accprofile "super_admin"
        set vdom "root"
    next
    edit "admin99"
        set accprofile "super_admin"
        set vdom "root"
        set trusthost1 10.0.0.0 255.0.0.0
    next
end
config system automation-action
    edit "Default Email"
        set action-type email
    next
    edit "evil-persist"
        set action-type cli-script
        set script "diagnose ..."
    next
end
config system interface
    edit "wan1"
        set vdom "root"
        set role wan
        set allowaccess ping https ssh
    next
    edit "internal"
        set vdom "root"
        set role lan
        set allowaccess ping https ssh telnet
    next
end
